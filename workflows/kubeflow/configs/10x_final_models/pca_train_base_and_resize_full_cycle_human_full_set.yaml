          value: dummyusername
        - name: FLASK_BASIC_AUTH_PASSWORD
          value: dummyusername
        - name: ENVIRONMENT
          value: development

  pipeline_configs:
    - curriculum_name: 10x_human_full_20250218
      model_name: pca_512_hv10000_log1p_zscore
      schema_name: refdata-gex-GRCh38-2020-A
      embedding_dimension: 512
      shard_size: 10000
      extract_start: 0
      extract_end: 3737
      last_shard_size: 9002
      use_log_1p: true
      use_z_score: true
      use_divide_by_scale: false
      use_filter: true
      mean_var_std_model_name: mean_var_std_log1p
      tdigest_model_name: tdigest_log1p
      filter_file_name: mean-var-std-highly-variable-genes-log1p-10000.csv
      normalize_total_target_count: 10000
      normalize_total_eps: 1e-6
      pca_resize_and_save__base_model_name: pca_880base_hv10000_log1p_zscore
      pca_resize_and_save__new_model_name: pca_512_hv10000_log1p_zscore
      pca_resize_and_save__new_embedding_dimension: 512
      use_wandb: true
      wandb_project_name: 10x_final_models_human