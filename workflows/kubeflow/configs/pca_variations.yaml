train_base:
  machine_specs:
    pca_train:
      display_name: PCA Train
      replica_count: 4
      machine_type: n1-highmem-32
      accelerator_type: NVIDIA_TESLA_T4
      accelerator_count: 4
      base_image: us-central1-docker.pkg.dev/dsp-cell-annotation-service/cas-services-cicd/cas-pytorch-cuda-pipeline-dev:1.4.6-alpha.1
      env:
        - name: WANDB_API_KEY
          value: 2bc373264f98a15fac0e869d98f7b207d575937d

  pipeline_configs:
    # All genes + different normalization strategies
    # All genes Lib size norm + Log1p
    - curriculum_name: human_10x_only_exclude_benchmarking_2024_05_16_ingest
      model_name: jrb_pca_880_all_genes_log1p_base
      bq_dataset_name: cas_2024_05_16_dataset
      schema_name: refdata-gex-GRCh38-2020-A
      shard_size: 10000
      n_components: 880
      extract_start: 0
      extract_end: 2930
      last_shard_size: 6596
      use_log_1p: true
      use_z_score: false
      use_divide_by_scale: false
      mean_var_std_model_name: mean_var_std_log1p_v1
      use_filter: false
      normalize_total_target_count: 10000
      pca_train__normalize_total_eps: 1e-6
      use_wandb: true
      wandb_project_name: cas_model_benchmarking
    # All genes Lib size norm + ZScore
    - curriculum_name: human_10x_only_exclude_benchmarking_2024_05_16_ingest
      model_name: jrb_pca_880_all_genes_zscore_base
