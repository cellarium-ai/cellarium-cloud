prepare_extract:
  machine_specs:
    bq_ops_prepare_extract:
      display_name: Bq Ops Prepare Extract
      replica_count: 1
      accelerator_type: null
      accelerator_count: 4
      machine_type: n1-standard-4
      base_image:  us-central1-docker.pkg.dev/dsp-cell-annotation-service/cas-services-cicd/cas-pytorch-pipeline-dev:1.4.6-alpha.4
      service_account: backend-service-account@dsp-cell-annotation-service.iam.gserviceaccount.com

  pipeline_configs:
    - bq_ops_prepare_extract__project_id: dsp-cell-annotation-service
      obs_columns_to_include: c.original_cell_id,c.cell_type,c.assay_ontology_term_id,c.cell_type_ontology_term_id,c.development_stage_ontology_term_id,c.disease_ontology_term_id,c.donor_id,c.is_primary_data,c.organism_ontology_term_id,c.self_reported_ethnicity_ontology_term_id,c.sex_ontology_term_id,c.suspension_type,c.tissue_ontology_term_id,c.assay,c.development_stage,c.disease,c.organism,c.self_reported_ethnicity,c.sex,c.tissue,c.total_mrna_umis,c.cell_type_distance_from_root,i.dataset_id,i.dataset_version_id
      filters_json_path: gs://cellarium-file-system/curriculum/extract_filters/filters_all_human_primary.json
      dataset: cas_2024_05_16_dataset
      extract_table_prefix: human_all_primary
      fq_allowed_original_feature_ids: dsp-cell-annotation-service.cas_reference_data.refdata-gex-GRCh38-2020-A
      extract_bin_size: 10000
      bucket_name: cellarium-human-primary-data
      extract_bucket_path: curriculum/human_all_primary

